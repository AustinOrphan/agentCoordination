[tool:pytest]
# Pytest configuration for Multi-Agent Coordination System

# BDD Configuration
bdd_features_base_dir = features/

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and formatting
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --color=yes
    --maxfail=5

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions  
    e2e: End-to-end tests for complete workflows
    performance: Performance and load tests
    error_handling: Error handling and edge case tests
    slow: Tests that take a long time to run
    flaky: Tests that may be flaky due to timing/concurrency
    smoke: Minimal smoke tests for basic functionality

# Minimum version
minversion = 6.0

# Test collection
collect_ignore = 
    setup.py
    build
    dist

# Warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (when using --cov)
# These are defaults, can be overridden by command line
# --cov=coordination_system --cov=. --cov-report=html --cov-report=term